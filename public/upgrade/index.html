<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upgrade — SnapAPI</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;line-height:1.6;}
    .container{max-width:800px;margin:0 auto;padding:20px;}
    nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid #1a1a2e;margin-bottom:32px;}
    .logo{font-size:1.3rem;font-weight:700;color:#fff;text-decoration:none;}
    .logo span{color:#6c5ce7;}
    h1{font-size:2rem;margin-bottom:8px;color:#fff;text-align:center;}
    p.sub{color:#888;margin-bottom:32px;text-align:center;}
    .plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:32px;}
    .plan{background:#12121a;border:1px solid #1a1a2e;border-radius:12px;padding:28px;text-align:center;}
    .plan.featured{border-color:#6c5ce7;position:relative;}
    .plan.featured::before{content:'Best Value';position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#6c5ce7;color:#fff;padding:4px 16px;border-radius:20px;font-size:0.8rem;font-weight:600;}
    .plan h3{color:#fff;font-size:1.2rem;}
    .plan .price{font-size:2.5rem;font-weight:800;color:#fff;margin:12px 0;}
    .plan .price span{font-size:1rem;color:#888;}
    .plan ul{list-style:none;margin:16px 0;text-align:left;}
    .plan ul li{padding:6px 0;font-size:0.9rem;color:#a0a0b0;}
    .plan ul li::before{content:'✓ ';color:#6c5ce7;}
    .btn{padding:12px 28px;border-radius:8px;font-weight:600;font-size:0.95rem;cursor:pointer;border:none;display:inline-block;text-decoration:none;}
    .btn-primary{background:#6c5ce7;color:#fff;width:100%;}
    .btn-primary:hover{background:#5a4bd1;}
    .btn-secondary{background:rgba(108,92,231,0.15);color:#6c5ce7;border:1px solid rgba(108,92,231,0.3);width:100%;}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
    .key-input{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
    .key-input input{flex:1;min-width:200px;padding:12px 16px;border-radius:8px;border:1px solid #1a1a2e;background:#0d0d15;color:#fff;font-size:0.95rem;}
    .key-input input:focus{outline:none;border-color:#6c5ce7;}
    .status-badge{text-align:center;padding:16px;background:rgba(108,92,231,0.1);border-radius:8px;margin-bottom:24px;}
    .status-badge .live{color:#27ae60;font-weight:700;}
    .status-badge .url{color:#6c5ce7;}
    .invoice-card{background:#12121a;border:1px solid #1a1a2e;border-radius:8px;padding:16px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;}
    .invoice-card .badge{padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:600;}
    .badge.pending{background:rgba(241,196,15,0.15);color:#f1c40f;}
    .badge.paid{background:rgba(39,174,96,0.15);color:#27ae60;}
    .toast{position:fixed;bottom:20px;right:20px;background:#6c5ce7;color:#fff;padding:12px 24px;border-radius:8px;font-size:0.9rem;display:none;z-index:100;}
    footer{text-align:center;padding:32px 0;border-top:1px solid #1a1a2e;color:#666;font-size:0.85rem;margin-top:40px;}
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/" class="logo"><span>Snap</span>API</a>
      <div><a href="/admin.html">Dashboard</a> <a href="/">Home</a></div>
    </nav>

    <div class="status-badge">
      <span class="live">● LIVE</span> — <span class="url">https://snapapi-production-50a0.up.railway.app</span><br>
      <small style="color:#888;">500 free credits to start. No credit card required.</small>
    </div>

    <h1>🚀 Upgrade Your Plan</h1>
    <p class="sub">Enter your API key below to unlock Pro pricing and instant upgrades.</p>

    <div class="key-input">
      <input type="text" id="apiKey" placeholder="Enter your API key (e.g., demo)">
      <button class="btn btn-primary" onclick="init()" style="width:auto;">Continue</button>
    </div>

    <div id="locked" style="text-align:center;padding:40px;color:#888;">
      <p style="font-size:2rem;margin-bottom:12px;">🔑</p>
      <p>Enter your API key above to see available upgrades.</p>
    </div>

    <div id="dashboard" style="display:none;">
      <div class="plans" id="plansContainer"></div>
      <div id="invoicesContainer"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <footer><div class="container">SnapAPI © 2026</div></footer>

  <script>
    const BASE = window.location.origin;
    let currentKey = '';

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#e74c3c' : '#6c5ce7';
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 4000);
    }

    async function init() {
      currentKey = document.getElementById('apiKey').value.trim();
      if (!currentKey) { showToast('Enter your API key', true); return; }
      
      // Verify the key and load plans
      try {
        const usageResp = await fetch(BASE + '/api/usage', { headers: { 'X-Api-Key': currentKey } });
        if (!usageResp.ok) { showToast('Invalid API key', true); return; }
        const usage = await usageResp.json();
        
        const plansResp = await fetch(BASE + '/api/payments/plans', { headers: { 'X-Api-Key': currentKey } });
        const plansData = await plansResp.json();
        
        renderPlans(plansData.plans, usage);
        loadInvoices();
        
        document.getElementById('locked').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        showToast('Authenticated as ' + usage.plan + ' plan');
      } catch(e) {
        showToast('Error: ' + e.message, true);
      }
    }

    function renderPlans(plans, usage) {
      const container = document.getElementById('plansContainer');
      container.innerHTML = plans.map(p => `
        <div class="plan ${p.popular ? 'featured' : ''}">
          <h3>${p.name}</h3>
          <div class="price">$${p.price}<span>/mo</span></div>
          <ul>
            <li>${p.credits.toLocaleString()} credits/month</li>
            <li>Screenshot API</li>
            <li>Metadata API</li>
            ${p.popular ? '<li>Priority rate limit</li><li>Custom viewport sizes</li><li>Email support</li>' : ''}
          </ul>
          ${usage.plan === p.id ? '<button class="btn btn-secondary" disabled>Current Plan</button>' : '<button class="btn btn-primary" onclick="checkout(\'' + p.id + '\')">Upgrade →</button>'}
        </div>
      `).join('');
    }

    async function checkout(planId) {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Processing...';
      
      try {
        const resp = await fetch(BASE + '/api/payments/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Api-Key': currentKey },
          body: JSON.stringify({ plan_id: planId })
        });
        const data = await resp.json();
        
        if (data.checkout_url) {
          // Stripe checkout — redirect
          window.location.href = data.checkout_url;
        } else if (data.success) {
          // Invoice mode
          showToast('Invoice created! Check below for details.');
          loadInvoices();
        } else {
          showToast(data.error || 'Checkout failed', true);
          btn.disabled = false;
          btn.textContent = 'Upgrade →';
        }
      } catch(e) {
        showToast('Error: ' + e.message, true);
        btn.disabled = false;
        btn.textContent = 'Upgrade →';
      }
    }

    async function loadInvoices() {
      try {
        const resp = await fetch(BASE + '/api/payments/invoices', { headers: { 'X-Api-Key': currentKey } });
        const invoices = await resp.json();
        const container = document.getElementById('invoicesContainer');
        
        if (invoices.length === 0) {
          container.innerHTML = '';
          return;
        }
        
        container.innerHTML = '<h3 style="color:#fff;margin-bottom:16px;">📄 Your Invoices</h3>' +
          invoices.map(inv => `
            <div class="invoice-card">
              <div>
                <strong style="color:#fff;">${inv.plan}</strong><br>
                <small style="color:#888;">#${inv.id.substring(0,8)} — $${inv.amount}</small>
              </div>
              <span class="badge ${inv.status}">${inv.status}</span>
            </div>
          `).join('');
      } catch(e) {}
    }

    // Check URL params for upgrade success
    const params = new URLSearchParams(window.location.search);
    if (params.get('upgraded') === 'true') {
      showToast('Upgrade successful! Your account has been upgraded.');
    }
  </script>
</body>
</html>
